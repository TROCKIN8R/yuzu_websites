<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contract Router demo — Yuzu.solutions</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/design-tokens.css">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--paper-500);
            color: var(--carbon-500);
        }
        .sign-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            background: linear-gradient(180deg, var(--yuzu-100) 0%, var(--paper-500) 40%);
        }
        .sign-card {
            width: 100%;
            max-width: 34rem;
            background: var(--paper-100);
            border: 1px solid var(--carbon-100);
            border-radius: 1rem;
            box-shadow: 0 12px 40px rgba(45, 52, 54, 0.08);
            overflow: hidden;
        }
        .sign-card-header {
            padding: 1.75rem 2rem 1.25rem;
            border-bottom: 1px solid var(--carbon-100);
            background: linear-gradient(180deg, var(--yuzu-100) 0%, var(--paper-100) 100%);
            text-align: center;
        }
        .sign-card-header img {
            width: 11rem;
            max-width: 100%;
            height: auto;
        }
        .sign-card-body {
            padding: 2rem;
        }
        .sign-eyebrow {
            margin: 0 0 0.5rem;
            font-size: 0.8125rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--zest-600);
        }
        .sign-title {
            margin: 0 0 1rem;
            font-size: 1.75rem;
            line-height: 1.2;
            font-weight: 800;
            color: var(--carbon-500);
        }
        .sign-disclaimer {
            margin: 0 0 1.25rem;
            padding: 1.125rem 1.25rem;
            background: var(--yuzu-100);
            border: 1px solid var(--yuzu-700);
            border-radius: 0.75rem;
        }
        .sign-disclaimer strong {
            display: block;
            margin-bottom: 0.375rem;
            font-size: 1rem;
            line-height: 1.5;
            color: var(--carbon-500);
        }
        .sign-disclaimer p {
            margin: 0;
            font-size: 0.875rem;
            line-height: 1.6;
            color: var(--carbon-300);
        }
        .sign-body {
            margin: 0 0 1rem;
            font-size: 1rem;
            line-height: 1.6;
            color: var(--carbon-500);
        }
        .sign-meta {
            margin: 0 0 0.5rem;
            font-size: 0.9375rem;
            line-height: 1.6;
            color: var(--carbon-500);
        }
        .sign-meta strong { color: var(--carbon-700); }
        .sign-status {
            display: inline-block;
            margin-top: 0.25rem;
            padding: 0.25rem 0.625rem;
            border-radius: 999px;
            font-size: 0.8125rem;
            font-weight: 700;
            background: var(--zest-100);
            color: var(--zest-700);
        }
        .sign-actions {
            margin-top: 1.5rem;
        }
        .sign-btn {
            display: inline-block;
            padding: 0.875rem 1.5rem;
            border-radius: 999px;
            background: var(--yuzu-500);
            border: 1px solid var(--yuzu-700);
            color: var(--carbon-500);
            font-size: 0.9375rem;
            font-weight: 700;
            text-decoration: none;
        }
        .sign-btn:hover { background: var(--yuzu-400); }
        .sign-loading {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1rem;
            color: var(--carbon-300);
        }
        .sign-spinner {
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid var(--carbon-100);
            border-top-color: var(--yuzu-700);
            border-radius: 50%;
            animation: sign-spin 0.8s linear infinite;
        }
        @keyframes sign-spin {
            to { transform: rotate(360deg); }
        }
        .sign-error { color: #b42318; }
        [hidden] { display: none !important; }
    </style>
</head>
<body>
    <main class="sign-page">
        <div class="sign-card">
            <div class="sign-card-header">
                <a href="https://yuzu.solutions/" aria-label="Yuzu.solutions home">
                    <img src="assets/yuzu-horizontal.svg" alt="Yuzu.solutions" width="176" height="40">
                </a>
            </div>
            <div class="sign-card-body">
                <div id="signLoading" class="sign-loading" aria-live="polite">
                    <span class="sign-spinner" aria-hidden="true"></span>
                    <span>Completing demo signature…</span>
                </div>

                <div id="signResult" hidden>
                    <p class="sign-eyebrow">Contract Router demo</p>
                    <h1 id="signHeadline" class="sign-title"></h1>
                    <div id="signDisclaimer" class="sign-disclaimer" hidden>
                        <strong id="signDisclaimerText"></strong>
                        <p>This page is part of the Contract Router demo on Yuzu.solutions — no real agreement was signed.</p>
                    </div>
                    <p id="signBody" class="sign-body"></p>
                    <p id="signStatusLine" class="sign-meta" hidden></p>
                    <div class="sign-actions">
                        <a id="signTableLink" class="sign-btn" href="https://yuzu.solutions/#test-automations">View live table</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/contract-router-config.js"></script>
    <script>
        (function initContractSignPage() {
            const loadingEl = document.getElementById('signLoading');
            const resultEl = document.getElementById('signResult');
            const headlineEl = document.getElementById('signHeadline');
            const disclaimerEl = document.getElementById('signDisclaimer');
            const disclaimerTextEl = document.getElementById('signDisclaimerText');
            const bodyEl = document.getElementById('signBody');
            const statusLineEl = document.getElementById('signStatusLine');
            const config = window.CONTRACT_ROUTER_CONFIG || {};
            const supabase = config.supabase || {};
            const token = new URLSearchParams(window.location.search).get('token');

            function showResult(payload) {
                loadingEl.hidden = true;
                resultEl.hidden = false;
                headlineEl.textContent = payload.headline || 'Something went wrong';
                bodyEl.textContent = payload.body || '';
                bodyEl.classList.toggle('sign-error', payload.ok === false);

                if (payload.showDisclaimer && payload.disclaimer) {
                    disclaimerEl.hidden = false;
                    disclaimerTextEl.textContent = payload.disclaimer;
                } else {
                    disclaimerEl.hidden = true;
                }

                if (payload.status) {
                    statusLineEl.hidden = false;
                    statusLineEl.innerHTML = '<strong>Status:</strong> <span class="sign-status">'
                        + (payload.status === 'signed' ? 'Signed' : payload.status)
                        + '</span>';
                } else {
                    statusLineEl.hidden = true;
                }
            }

            function showError(message) {
                showResult({
                    ok: false,
                    headline: 'Could not complete demo signature',
                    body: message,
                    showDisclaimer: false
                });
            }

            if (!token) {
                showError('This link is missing a token. Submit the Contract Router form again to receive a new signature email.');
                return;
            }

            const baseUrl = String(supabase.url || '').replace(/\/$/, '');
            const anonKey = String(supabase.anonKey || '').trim();
            const intakeFunction = String(supabase.intakeFunction || 'contract-router').trim();

            if (!baseUrl || !anonKey) {
                showError('Demo signing is not configured on this page.');
                return;
            }

            fetch(baseUrl + '/functions/v1/' + intakeFunction, {
                method: 'POST',
                headers: {
                    apikey: anonKey,
                    Authorization: 'Bearer ' + anonKey,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ action: 'sign', token: token })
            })
                .then(function (response) {
                    return response.json().then(function (payload) {
                        return { response: response, payload: payload };
                    });
                })
                .then(function (result) {
                    if (!result.response.ok && !result.payload?.headline) {
                        throw new Error(result.payload?.error || 'Signing failed (' + result.response.status + ')');
                    }
                    showResult(result.payload);
                })
                .catch(function (error) {
                    showError(String(error.message || error));
                });
        })();
    </script>
</body>
</html>
