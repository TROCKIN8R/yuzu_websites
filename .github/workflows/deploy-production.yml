name: Deploy Production

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements-blog.txt

      - name: Publish due articles
        id: publish
        run: |
          python3 scripts/build_blog.py --publish-due-only
          if git diff --quiet content/blog; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat content/blog
          fi

      - name: Build site
        run: |
          python3 scripts/build_blog.py
          python3 scripts/build_locales.py
          python3 scripts/patch_nav_blog.py
          python3 scripts/build_blog.py --teasers-only

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./yuzu_github_page
          publish_branch: gh-pages
          keep_files: true
          commit_message: "Deploy production site from main"

      - name: Commit published article status
        if: steps.publish.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blog
          git commit -m "Publish scheduled blog posts"
          git push
