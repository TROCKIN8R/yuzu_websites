name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-supabase-functions.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Sync Edge Function secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_AUTOMATION }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
        run: |
          if [ -n "${TURNSTILE_SECRET_KEY}" ]; then
            supabase secrets set "TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}" --project-ref mwgbeolcgigvpufjmodz
            echo "Synced TURNSTILE_SECRET_KEY to Supabase."
          else
            echo "::warning::GitHub secret TURNSTILE_SECRET_KEY is not set. Captcha verification will fail until it is added."
          fi

      - name: Deploy opportunity-intake
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_AUTOMATION }}
        run: supabase functions deploy opportunity-intake --project-ref mwgbeolcgigvpufjmodz

      - name: Deploy refresh-watchdog
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_AUTOMATION }}
        run: supabase functions deploy refresh-watchdog --project-ref mwgbeolcgigvpufjmodz
