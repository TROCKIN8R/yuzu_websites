name: Publish scheduled blog

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements-blog.txt

      - name: Publish due articles
        id: publish
        run: |
          python3 scripts/build_blog.py --publish-due-only
          if git diff --quiet content/blog; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No article status changes to commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat content/blog
          fi

      - name: Commit and push
        if: steps.publish.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blog
          git commit -m "Publish scheduled blog posts"
          git push
